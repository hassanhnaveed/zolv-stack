name: Deploy zolv-stack to Lightsail (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-zolv-stack-main
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Package deployment artifact
        run: |
          ARTIFACT="/tmp/zolv-stack-${{ github.sha }}.tgz"
          tar \
            --exclude='./.git' \
            --exclude='./node_modules' \
            --exclude='./.next' \
            --exclude='./.eslintcache' \
            -czf "${ARTIFACT}" .
          mv "${ARTIFACT}" "zolv-stack-${{ github.sha }}.tgz"

      - name: Build
        run: npm run build

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: zolv-stack-${{ github.sha }}
          path: zolv-stack-${{ github.sha }}.tgz
          if-no-files-found: error

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: zolv-stack-${{ github.sha }}

      - name: Copy files to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: "zolv-stack-${{ github.sha }}.tgz,scripts/deploy-release.sh"
          target: /tmp

      - name: Deploy artifact over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SHA: ${{ github.sha }}
          APP_DIR: ${{ secrets.LIGHTSAIL_APP_DIR }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          envs: SHA,APP_DIR,HEALTHCHECK_URL
          script: |
            chmod +x /tmp/deploy-release.sh /tmp/scripts/deploy-release.sh 2>/dev/null || true
            if [ -f /tmp/deploy-release.sh ]; then
              bash /tmp/deploy-release.sh
            else
              bash /tmp/scripts/deploy-release.sh
            fi
