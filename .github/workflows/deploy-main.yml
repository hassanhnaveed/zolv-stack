name: Deploy zolv-stack to Lightsail (main)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-zolv-stack-main
  cancel-in-progress: true

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest
    environment: production
    env:
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
      NEXT_PUBLIC_GOOGLE_API_KEY: ${{ vars.NEXT_PUBLIC_GOOGLE_API_KEY }}
      NEXT_PUBLIC_GOOGLE_APP_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_APP_ID }}
      NEXT_PUBLIC_CLARITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_CLARITY_PROJECT_ID }}
      SEO_GOOGLE_SITE_VERIFICATION: ${{ secrets.SEO_GOOGLE_SITE_VERIFICATION }}
      SEO_BING_SITE_VERIFICATION: ${{ secrets.SEO_BING_SITE_VERIFICATION }}
      SEO_INDEXING_ENABLED: ${{ vars.SEO_INDEXING_ENABLED }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: SEO validation
        run: npm run seo:check

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Package deployment artifact
        run: |
          ARTIFACT="/tmp/zolv-stack-${{ github.sha }}.tgz"
          tar \
            --exclude='./.git' \
            --exclude='./.eslintcache' \
            --exclude='./.github' \
            -czf "${ARTIFACT}" .
          mv "${ARTIFACT}" "zolv-stack-${{ github.sha }}.tgz"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: zolv-stack-${{ github.sha }}
          path: zolv-stack-${{ github.sha }}.tgz
          if-no-files-found: error

  deploy:
    name: Deploy to Lightsail
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: zolv-stack-${{ github.sha }}

      - name: Prepare deploy files
        run: |
          cp scripts/deploy-release.sh deploy-release.sh
          sed -i 's/\r$//' deploy-release.sh
          chmod +x deploy-release.sh
          ls -la "zolv-stack-${{ github.sha }}.tgz" deploy-release.sh

      - name: Copy artifact to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: zolv-stack-${{ github.sha }}.tgz
          target: /tmp

      - name: Copy deploy script to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: deploy-release.sh
          target: /tmp

      - name: Deploy artifact over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SHA: ${{ github.sha }}
          APP_DIR: ${{ secrets.LIGHTSAIL_APP_DIR }}
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          command_timeout: 30m
          debug: true
          script_stop: true
          envs: SHA,APP_DIR,HEALTHCHECK_URL
          script: |
            set -xe
            echo "=== Remote /tmp ==="
            ls -la /tmp
            echo "SHA=${SHA:-unset}"
            echo "APP_DIR=${APP_DIR:-unset}"
            if [ ! -f /tmp/deploy-release.sh ]; then
              echo "ERROR: /tmp/deploy-release.sh is missing"
              find /tmp -maxdepth 3 -type f | sort
              exit 1
            fi
            export SHA APP_DIR HEALTHCHECK_URL
            bash /tmp/deploy-release.sh
